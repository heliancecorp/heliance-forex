      <stop offset="0%" stop-color="#00f5c4" />
      <stop offset="100%" stop-color="#0088ff" />
    </linearGradient>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#fGrad)" stroke-width="8" stroke-dasharray="160 60" />
  
  <!-- Stylized H -->
  <path d="M 36 32 L 36 68 M 64 32 L 64 68 M 36 50 L 64 50" stroke="url(#fGrad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Gold Core -->
