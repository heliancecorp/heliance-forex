<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Heliance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <aside class="auth-side">
    <a href="index.html" class="logo"><span class="logo-mark"></span> Heliance</a>
    <div class="auth-quote">
      Welcome back to the <em>chamber.</em><br>
      Capital pooled. Returns compounded. Markets engaged.
    </div>
    <div class="text-mono text-dim" style="font-size:12px;">ASIA-SE-1 · LIVE</div>
  </aside>

  <main class="auth-form-side">
    <div class="auth-form">
      <h2>Sign in</h2>
      <p class="lead">Access your trading dashboard.</p>

      <div id="alertBox"></div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" required autocomplete="email" placeholder="your@email.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>

      <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">
        Sign in
      </button>

      <div class="auth-foot">New to Heliance? <a href="register.html">Open an account</a></div>
      <div class="auth-foot" style="margin-top:8px;"><a href="index.html" style="color:var(--text-dim);">← Back home</a></div>
    </div>
  </main>
</div>

<script type="module">
import {
  auth, db,
  signInWithEmailAndPassword, onAuthStateChanged,
  ref, get, onValue,
  ADMIN_EMAIL
} from './js/firebase-config.js';

// Auto-redirect if already logged in
onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  const snap = await get(ref(db, `users/${user.uid}`));
  if (snap.exists() && snap.val().suspended) return;
  window.location.href = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()
    ? 'admin.html' : 'dashboard.html';
});

function showAlert(msg, type = 'error') {
  document.getElementById('alertBox').innerHTML =
    `<div class="alert alert-${type}">${msg}</div>`;
}

window.doLogin = async function () {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) { showAlert('Please fill in all fields.'); return; }

  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  btn.disabled  = true;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const snap = await get(ref(db, `users/${cred.user.uid}`));

    if (snap.exists() && snap.val().suspended) {
      showAlert('Account suspended. Contact theheliance@gmail.com');
      btn.innerHTML = 'Sign in';
      btn.disabled  = false;
      return;
    }

    window.location.href = email.toLowerCase() === ADMIN_EMAIL.toLowerCase()
      ? 'admin.html' : 'dashboard.html';

  } catch (err) {
    let msg = 'Sign in failed. Check your credentials.';
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password')
      msg = 'Invalid email or password.';
    if (err.code === 'auth/user-not-found')
      msg = 'No account found with that email.';
    if (err.code === 'auth/too-many-requests')
      msg = 'Too many attempts. Try again later.';
    showAlert(msg);
    btn.innerHTML = 'Sign in';
    btn.disabled  = false;
  }
};
</script>
</body>
</html>
